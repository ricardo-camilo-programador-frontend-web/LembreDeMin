name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Repository
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Check repository
        run: echo "Repository checkout OK - $(ls | head -5)"

  sonar:
    name: Analise SonarQube
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup PATH
        run: echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Instalar dependencias
        run: echo 'No install needed - no package.json'

      - name: Run SonarScanner
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: /opt/sonar-scanner/bin/sonar-scanner
